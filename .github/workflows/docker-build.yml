name: docker-build

# Builds the three BindCraft images and pushes them directly to Docker Hub.
# Conventions follow Common_project/.github/workflows/docker-publish.yml:
#   - login via secrets.DOCKER_USERNAME / secrets.DOCKER_PASSWORD
#   - aggressive disk cleanup (gpu image is large: CUDA + jax + ~5.3GB AF2 weights baked in)
#   - buildx + GHA layer cache
#
# Images pushed:
#   <DOCKER_USERNAME>/bindcraft:gpu            (and :gpu-<shortsha>)
#   <DOCKER_USERNAME>/bindcraft:rosetta        (and :rosetta-<shortsha>)
#   <DOCKER_USERNAME>/bindcraft:orchestrator   (and :orchestrator-<shortsha>)
#
# NOTE: GitHub runners have NO GPU. CI only BUILDS/PUSHES images; run the pipeline
# on a GPU host with `docker compose up` (see README-docker.md).
# The gpu image downloads ~5.3GB of AF2 weights during build (network required) and the
# resulting image is ~10GB+; the disk-cleanup step below makes room on the runner.

on:
  push:
    branches: [main]
    # Only run when files that actually affect the images change. The gpu/rosetta images
    # COPY the whole repo, so app code + settings + the binaries matter, not just docker/.
    paths:
      - 'docker/**'
      - 'functions/**'
      - 'bindcraft.py'
      - 'settings_advanced/**'
      - 'settings_filters/**'
      - 'settings_target/**'
      - 'example/**'
      - '.github/workflows/docker-build.yml'
  workflow_dispatch:   # manual full build (e.g. for releases), ignores the paths filter

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1   # build heavy images one at a time to stay within runner disk
      matrix:
        include:
          - image: gpu
            dockerfile: docker/Dockerfile.gpu
          - image: rosetta
            dockerfile: docker/Dockerfile.rosetta
          - image: orchestrator
            dockerfile: docker/Dockerfile.orchestrator

    steps:
      - name: 🗑️ Free disk space (aggressive)
        run: |
          echo "=== before cleanup ==="; df -h /
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost \
                      "$AGENT_TOOLSDIRECTORY" /usr/local/lib/android \
                      /opt/hostedtoolcache/CodeQL /usr/share/swift
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*
          docker system prune -af --volumes || true
          echo "=== after cleanup ==="; df -h /

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Short SHA
        id: vars
        run: echo "sha=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/bindcraft:${{ matrix.image }}
            ${{ secrets.DOCKER_USERNAME }}/bindcraft:${{ matrix.image }}-${{ steps.vars.outputs.sha }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
          outputs: type=image,push=true

      - name: 🧹 Post-build cleanup
        if: always()
        run: |
          docker system prune -af || true
          df -h /

  validate:
    # Lint Dockerfiles and validate the compose file (cheap, no GPU, no secrets).
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint GPU Dockerfile (hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: docker/Dockerfile.gpu
          ignore: DL3008,DL3013,DL3059

      - name: Lint Rosetta Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: docker/Dockerfile.rosetta
          ignore: DL3008,DL3013,DL3059

      - name: Lint orchestrator Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: docker/Dockerfile.orchestrator
          ignore: DL3013

      - name: Validate docker-compose.yml
        run: docker compose -f docker-compose.yml config >/dev/null
